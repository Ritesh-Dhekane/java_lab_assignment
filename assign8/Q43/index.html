<!DOCTYPE html>
<html>
<head>
    <title>Q43 Insert Student</title>
</head>
<body>
    <h2>Q43 - Insert Student Data</h2>
    <p>devName: Ritesh Dhekane</p>
    <form action="insert.jsp" method="post">
        <table>
            <tr>
                <td>Roll Number:</td>
                <td><input type="number" name="rno" required></td>
            </tr>
            <tr>
                <td>Student Name:</td>
                <td><input type="text" name="sname" required></td>
            </tr>
            <tr>
                <td>Percentage:</td>
                <td><input type="number" step="0.01" name="percentage" required></td>
            </tr>
            <tr>
                <td colspan="2"><input type="submit" value="Insert Student"></td>
            </tr>
        </table>
    </form>
</body>
</html>
