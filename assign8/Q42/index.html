<!DOCTYPE html>
<html>
<head>
    <title>Q42 Employee Salary Update</title>
</head>
<body>
    <h2>Q42 - Update Employee Salary</h2>
    <p>devName: Ritesh Dhekane</p>
    <form action="update.jsp" method="post">
        <table>
            <tr>
                <td>Employee Number:</td>
                <td><input type="number" name="empno" required></td>
            </tr>
            <tr>
                <td>New Salary:</td>
                <td><input type="number" step="0.01" name="salary" required></td>
            </tr>
            <tr>
                <td colspan="2"><input type="submit" value="Update Salary"></td>
            </tr>
        </table>
    </form>
</body>
</html>
