<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Viewer</title>
    <link id="prismLightTheme" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-github.min.css" rel="stylesheet">
    <link id="prismDarkTheme" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-okaidia.min.css" rel="stylesheet" disabled>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <div class="nav-left">
        <a href="index.html" class="back-btn">&larr; Back</a>
        <h2 class="folder-title" id="folderTitle"></h2>
    </div>

    <div class="nav-actions">
        <button id="sidebarToggle" class="theme-btn mobile-only" type="button" aria-expanded="false" aria-controls="sidebar">Menu</button>
        <button id="themeToggle" class="theme-btn" type="button">Dark</button>
    </div>
</nav>

<div class="layout">
    <aside id="sidebar">
        <div class="sidebar-section">
            <h3>Questions</h3>
            <ul id="folderList"></ul>
        </div>
        <div class="sidebar-section">
            <h3>Files</h3>
            <ul id="fileList"></ul>
        </div>
    </aside>

    <main>
        <div id="cards-container" class="cards-container"></div>
    </main>
</div>

<div id="instructionsModal" class="modal hidden" aria-hidden="true" role="dialog" aria-labelledby="instructionsTitle">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-panel">
        <div class="modal-header">
            <div>
                <h3 id="instructionsTitle">Run Instructions</h3>
                <p id="instructionsSubtitle" class="modal-subtitle"></p>
            </div>
            <button id="closeModal" class="icon-btn" type="button" aria-label="Close instructions">Close</button>
        </div>
        <div id="instructionsContent" class="docs-content"></div>
    </div>
</div>

<footer>
    &copy; 2026 Ritesh Dhekane | Java Visualizer
</footer>

<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup-templating.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
